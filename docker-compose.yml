services:
  retrieval-api:
    image: toukouyuu/retrieval-api:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: retrieval-api
    environment:
      - RETRIEVAL_DATA_DIR=/data
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_API_URL=http://embedding-api:8100
      - DEFAULT_EMBEDDING_MODEL=BAAI/bge-m3
      - DEFAULT_EMBEDDING_DIMENSION=1024
      - RERANK_ENABLED=false
    ports:
      - "127.0.0.1:8300:8000"
    volumes:
      - ./data/retrieval:/data
    depends_on:
      - qdrant
      - embedding-api
    restart: unless-stopped

  embedding-api:
    image: toukouyuu/embedding-api:latest
    container_name: embedding-api
    environment:
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DEVICE=auto
      - EMBEDDING_BATCH_SIZE=2
      - EMBEDDING_MAX_LENGTH=1024
    ports:
      - "127.0.0.1:8100:8100"
    volumes:
      - ./data/models:/models
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.2
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
